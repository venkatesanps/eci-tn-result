name: Counting Day — Live ECI Data

# Runs every 5 minutes on May 4 2026 (UTC 01:00–19:00 = IST 06:30–00:30)
# Also triggered manually for testing at any time.
on:
  schedule:
    - cron: '*/5 1-19 4 5 *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch ECI data and update live-summary.json
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.error
          import json
          import re
          import sys
          from datetime import datetime, timezone, timedelta

          IST = timezone(timedelta(hours=5, minutes=30))
          now_ist = datetime.now(IST)
          now_str = now_ist.strftime("%Y-%m-%dT%H:%M:%S+05:30")

          # ── Candidate ECI result endpoints (Tamil Nadu state code S26) ──────────
          # ECI changes folder names each election — try all known patterns
          ECI_URLS = [
              # Pattern 1: Result2026 (most likely)
              "https://results.eci.gov.in/Result2026/StatewiseS26.json",
              "https://results.eci.gov.in/Result2026/partywiseresult-S26.htm",
              "https://results.eci.gov.in/Result2026/StatewiseS26.htm",
              # Pattern 2: AcResultState + month (used in Dec 2023 elections)
              "https://results.eci.gov.in/AcResultStateApr2026/StatewiseS26.json",
              "https://results.eci.gov.in/AcResultStateApr2026/partywiseresult-S26.htm",
              "https://results.eci.gov.in/AcResultStateApr2026/StatewiseS26.htm",
              # Pattern 3: AcResultStateApril (full month name variant)
              "https://results.eci.gov.in/AcResultStateApril2026/StatewiseS26.json",
              "https://results.eci.gov.in/AcResultStateApril2026/partywiseresult-S26.htm",
              # Pattern 4: AcResultGen style (used for 2024 general election)
              "https://results.eci.gov.in/AcResultGenApril2026/StatewiseS26.json",
              "https://results.eci.gov.in/AcResultGenApril2026/partywiseresult-S26.htm",
              # Pattern 5: Fallback Puducherry (U05) which votes same day
              "https://results.eci.gov.in/Result2026/StatewiseU05.htm",
          ]

          # Alliance membership mapping (2026: AIADMK joined BJP NDA; TVK new standalone)
          DMK_PLUS_PARTIES = {
              "Dravida Munnetra Kazhagam", "DMK",
              "Indian National Congress", "INC",
              "Viduthalai Chiruthaigal Katchi", "VCK",
              "Communist Party of India", "CPI",
              "Communist Party of India  (Marxist)", "CPM",
              "Communist Party of India (Marxist)", "CPM",
              "MDMK", "IUML",
          }
          AIADMK_NDA_PARTIES = {
              "All India Anna Dravida Munnetra Kazhagam", "AIADMK",
              "Bharatiya Janata Party", "BJP",
              "Pattali Makkal Katchi", "PMK",
              "Amma Makkal Munnetra Kazhagam", "AMMK",
          }
          TVK_PARTIES = {
              "Tamilaga Vettri Kazhagam", "TVK",
          }

          def alliance_of(party_name: str) -> str:
              n = party_name.strip()
              if n in TVK_PARTIES or "Tamilaga Vettri" in n or n == "TVK":
                  return "TVK"
              if n in DMK_PLUS_PARTIES or any(k in n for k in ["Dravida Munnetra", "Indian National Congress", "Viduthalai"]):
                  return "DMK+ (SPA)"
              if n in AIADMK_NDA_PARTIES or "Anna Dravida" in n or "Bharatiya Janata" in n or "Pattali Makkal" in n:
                  return "NDA (AIADMK+)"
              return "NTK + Others"

          def try_fetch(url: str) -> str | None:
              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "Mozilla/5.0", "Accept": "*/*"}
                  )
                  with urllib.request.urlopen(req, timeout=12) as r:
                      content = r.read().decode("utf-8", errors="ignore")
                      if len(content) > 200:
                          return content
              except Exception as e:
                  print(f"  {url}: {e}", file=sys.stderr)
              return None

          def parse_json(text: str) -> dict | None:
              try:
                  data = json.loads(text)
                  # Look for common ECI JSON structures
                  parties = None
                  for key in ["partywise", "parties", "results", "data"]:
                      if key in data and isinstance(data[key], list):
                          parties = data[key]
                          break
                  if parties is None and isinstance(data, list):
                      parties = data
                  if parties is None:
                      return None

                  totals = {"DMK+ (SPA)": [0,0], "NDA (AIADMK+)": [0,0], "TVK": [0,0], "NTK + Others": [0,0]}
                  reported = 0
                  for p in parties:
                      name = p.get("party_name") or p.get("name") or p.get("Party") or ""
                      won  = int(p.get("won",  p.get("Won",  p.get("W",  0))) or 0)
                      lead = int(p.get("leading", p.get("Leading", p.get("L", 0))) or 0)
                      al = alliance_of(name)
                      totals[al][0] += won
                      totals[al][1] += lead
                      reported += won

                  return {"totals": totals, "reported": reported}
              except Exception:
                  return None

          def parse_html(html: str) -> dict | None:
              # Look for number patterns near party names in ECI HTML tables
              totals = {"DMK+ (SPA)": [0,0], "NDA (AIADMK+)": [0,0], "TVK": [0,0], "NTK + Others": [0,0]}

              # Try to find table rows with pattern: party name | won | leading
              # ECI uses various HTML structures; try a flexible regex
              rows = re.findall(
                  r'<tr[^>]*>(.*?)</tr>',
                  html, re.DOTALL | re.IGNORECASE
              )
              total_won = 0
              matched_any = False
              for row in rows:
                  cells = re.findall(r'<t[dh][^>]*>(.*?)</t[dh]>', row, re.DOTALL | re.IGNORECASE)
                  cells = [re.sub(r'<[^>]+>', '', c).strip() for c in cells]
                  if len(cells) < 3:
                      continue
                  party_name = cells[0]
                  if len(party_name) < 3 or party_name[0].isdigit():
                      continue
                  # Try to find won/leading numbers in subsequent cells
                  nums = []
                  for c in cells[1:]:
                      try: nums.append(int(c.replace(',', '')))
                      except: pass
                  if len(nums) >= 2:
                      al = alliance_of(party_name)
                      totals[al][0] += nums[0]   # won
                      totals[al][1] += nums[1]   # leading
                      total_won += nums[0]
                      matched_any = True

              if not matched_any:
                  return None
              return {"totals": totals, "reported": total_won}

          # ── Load current summary ─────────────────────────────────────────────
          with open("data/live-summary.json") as f:
              summary = json.load(f)

          # ── Try each ECI URL ─────────────────────────────────────────────────
          parsed = None
          for url in ECI_URLS:
              print(f"Trying {url}...", file=sys.stderr)
              text = try_fetch(url)
              if not text:
                  continue
              # Try JSON first
              if url.endswith(".json"):
                  parsed = parse_json(text)
              else:
                  parsed = parse_html(text)
                  if not parsed:
                      parsed = parse_json(text)  # some .htm return JSON
              if parsed:
                  print(f"Got data from {url}", file=sys.stderr)
                  break

          # ── Update summary with ECI data (or just timestamp) ─────────────────
          summary["lastChecked"] = now_str

          if parsed:
              totals = parsed["totals"]
              alliances = [
                  {"name": "DMK+ (SPA)",    "won": totals["DMK+ (SPA)"][0],    "leading": totals["DMK+ (SPA)"][1],    "projected": 118, "range": "104–135", "color": "#3b82f6"},
                  {"name": "NDA (AIADMK+)", "won": totals["NDA (AIADMK+)"][0], "leading": totals["NDA (AIADMK+)"][1], "projected": 100, "range": "82–127",  "color": "#ef4444"},
                  {"name": "TVK",           "won": totals["TVK"][0],           "leading": totals["TVK"][1],           "projected": 12,  "range": "6–18",    "color": "#a855f7"},
                  {"name": "NTK + Others",  "won": totals["NTK + Others"][0],  "leading": totals["NTK + Others"][1],  "projected": 4,   "range": "0–6",     "color": "#64748b"},
              ]
              all_declared = sum(a["won"] for a in alliances) >= 234

              summary["status"] = "declared" if all_declared else "counting"
              summary["reported"] = parsed["reported"]
              summary["alliances"] = alliances
              summary["lastUpdated"] = now_str
              summary["note"] = f"Live results from ECI. {parsed['reported']} seats declared as of {now_str}."
              print(f"Updated: {json.dumps({a['name']: f'{a[\"won\"]}+{a[\"leading\"]}' for a in alliances})}", file=sys.stderr)
          else:
              # No ECI data yet — but if it's past 7am IST on counting day,
              # flip to "counting" so the live section activates on the page.
              # Data will fill in once ECI's result server responds.
              if summary["status"] == "projected" and now_ist.hour >= 7:
                  summary["status"] = "counting"
                  summary["note"] = "Counting underway. Waiting for ECI result server to respond."
                  print("No ECI data yet — switched status to counting at 7am IST", file=sys.stderr)
              else:
                  print("No ECI data available — keeping existing status", file=sys.stderr)

          with open("data/live-summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          print("Done.", file=sys.stderr)
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live-summary.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Live data update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
